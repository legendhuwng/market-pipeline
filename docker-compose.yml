version: '3.8'

services:

  # ─── Infrastructure ──────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: market-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: market_raw
      MYSQL_USER: market_user
      MYSQL_PASSWORD: market123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init/mysql:/docker-entrypoint-initdb.d
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: market-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - pipeline-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: market-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: market-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: rabbit_user
      RABBITMQ_DEFAULT_PASS: rabbit123
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: market-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    networks:
      - pipeline-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Services ────────────────────────────
  ingest-service:
    build: ./ingest-service
    container_name: market-ingest
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/market_raw?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: market_user
      SPRING_DATASOURCE_PASSWORD: market123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    ports:
      - "8080:8080"
    networks:
      - pipeline-net
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy

  fake-generator:
    build: ./fake-generator
    container_name: market-generator
    restart: unless-stopped
    environment:
      GENERATOR_INGEST_URL: http://ingest-service:8080/api/trades
      GENERATOR_INTERVAL_MS: 500
      GENERATOR_ENABLED: "true"
    ports:
      - "8081:8081"
    networks:
      - pipeline-net
    depends_on:
      - ingest-service

  raw-consumer:
    build: ./raw-consumer
    container_name: market-raw-consumer
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/market_raw?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: market_user
      SPRING_DATASOURCE_PASSWORD: market123
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: rabbit_user
      SPRING_RABBITMQ_PASSWORD: rabbit123
    ports:
      - "8082:8082"
    networks:
      - pipeline-net
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  etl-worker:
    build: ./etl-worker
    container_name: market-etl
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/market_raw?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: market_user
      SPRING_DATASOURCE_PASSWORD: market123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: rabbit_user
      SPRING_RABBITMQ_PASSWORD: rabbit123
    ports:
      - "8084:8084"
    networks:
      - pipeline-net
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  report-service:
    build: ./report-service
    container_name: market-report
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/market_dw?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: market_user
      SPRING_DATASOURCE_PASSWORD: market123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: redis123
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: rabbit_user
      SPRING_RABBITMQ_PASSWORD: rabbit123
    ports:
      - "8085:8085"
    networks:
      - pipeline-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: market-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: market_user
      PMA_PASSWORD: market123
    ports:
      - "8888:80"
    networks:
      - pipeline-net
    depends_on:
      mysql:
        condition: service_healthy


volumes:
  mysql_data:

networks:
  pipeline-net:
    driver: bridge