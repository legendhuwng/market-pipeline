server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/market_raw?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: market_user
    password: market123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: raw-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.market.consumer.model.TradeEventMessage
  rabbitmq:
    host: localhost
    port: 5672
    username: rabbit_user
    password: rabbit123

kafka:
  topic:
    trades: market.trades

rabbitmq:
  queue:
    staging: etl.staging

consumer:
  batch-size: 200

logging:
  level:
    com.market: DEBUG