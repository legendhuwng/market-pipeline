server:
  port: 8085

spring:
  application:
    name: report-service
  datasource:
    url: jdbc:mysql://localhost:3306/market_dw?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: market_user
    password: market123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
      password: redis123
      timeout: 2000ms
  rabbitmq:
    host: localhost
    port: 5672
    username: rabbit_user
    password: rabbit123

jwt:
  secret: market-pipeline-super-secret-key-2026-very-long-string
  expiration-ms: 86400000  # 24 giờ

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.market: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always